name: Deploy to Firebase on merge

on:
  push:
    branches:
      - main

# Minimal permissions — only what GitHub Actions itself needs
permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      # All VITE_* values are read from GitHub Secrets at build time.
      # They get baked into the JS bundle — the Firebase config values are
      # public identifiers by Firebase's design, but we keep them out of
      # source code so the repo remains generic and environment-agnostic.
      # The Gemini key must also be restricted to your domain in AI Studio.
      - name: Build (inject secrets from GitHub)
        env:
          VITE_GEMINI_API_KEY:               ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL:        ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID:      ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      # Deploy: Hosting (dist/) + Realtime Database rules + Storage rules.
      # The service account JSON is written to a temp file, used, then
      # immediately deleted — it never persists in the runner environment.
      - name: Deploy Hosting + Database + Storage Rules to Firebase
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SNAPSPACE_4D243 }}
        run: |
          printf '%s' "$FIREBASE_SA_JSON" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            npx --yes firebase-tools@latest deploy \
              --only hosting,database,storage \
              --project snapspace-4d243 \
              --non-interactive
          rm -f /tmp/sa.json
